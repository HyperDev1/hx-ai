services:
  hx:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
      args:
        HX_VERSION: latest
    container_name: hx-sandbox
    ports:
      - "3000:3000"
    volumes:
      - ../:/workspace
      - hx-state:/home/hx/.hx
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    stdin_open: true
    tty: true

volumes:
  hx-state:
    driver: local
